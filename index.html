<!DOCTYPE html>
<html>
<head>
  <title>My Gallery</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 50px;
      margin-top: 30px;
    }

    .bio {
      margin: 10px;
      font-size: 18px;
      color: #ccc;
    }

    .links {
      margin: 20px;
    }

    .links a {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }

    .album {
      margin: 20px;
    }

    .album img {
      width: 90%;
      max-width: 600px;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 15px;
    }

    .footer {
      margin: 40px;
      color: gray;
    }
  </style>

</head>

<body>

<h1>MY PORTFOLIO</h1>

<div class="bio">
  Hey bro 😎 This is my gallery website.  
  Here I share my photos and albums.
</div>

<div class="links">
  <a href="#">Instagram</a>
  <a href="#">YouTube</a>
  <a href="#">GitHub</a>
</div>

<div class="album">
  <a href="album1.html">
    <img src="cover.jpg">
  </a>
  <p>Trip Album</p>
</div>

<div class="footer">
  Thanks for visiting ❤️
</div>

</body>
</html>
